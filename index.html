<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Paola, meu amor 💚</title>

<style>
body {
    background: linear-gradient(135deg, #0f2027, #2e7d32, #a5d6a7);
    color: white;
    text-align: center;
    font-family: Arial;
    padding-top: 100px;
}

input {
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    background-color: pink;
    border: none;
    border-radius: 8px;
    margin-left: 10px;
    cursor: pointer;
}

#proximo {
    display: none;
    margin-top: 20px;
}

/* DISCO GIRANDO */

#disco{
position: fixed;
bottom: 20px;
right: 20px;
width: 80px;
cursor: pointer;
animation: girar 6s linear infinite;
}

@keyframes girar{
from{ transform: rotate(0deg); }
to{ transform: rotate(360deg); }
}

/* CAIXA DA DICA */

#dicaMusica{
display:none;
position:fixed;
bottom:120px;
right:20px;
background:white;
color:black;
padding:15px;
border-radius:10px;
font-size:14px;
width:220px;
box-shadow:0px 0px 10px rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<h1>Para confirmar que é você</h1>

<p>Qual foi o primeiro apelido que eu te chamei?</p>

<input type="text" id="resposta" placeholder="Digite aqui...">
<button onclick="verificar()">Confirmar</button>

<p id="mensagem" style="margin-top:30px;"></p>

<button id="proximo" onclick="irParaCarta()">Ir para a próxima página 💌</button>

<!-- DISCO DE MUSICA -->

<img id="disco" src="https://cdn-icons-png.flaticon.com/512/727/727218.png" onclick="mostrarDica()">

<div id="dicaMusica">
🎵 Para essa surpresa ficar perfeita...<br><br>
Pesquise essa música:<br>
<b>Meu Abrigo - Melim</b><br>
Comece em <b>1:03</b> 💚
</div>

<script>

function verificar() {

    var respostaDigitada = document.getElementById("resposta").value.trim().toLowerCase();

    if (respostaDigitada === "boleta") {

        document.getElementById("mensagem").innerHTML =
        "Acesso liberado minha princesa 💚";

        document.getElementById("proximo").style.display = "inline-block";

    } else {
        document.getElementById("mensagem").innerHTML =
        "Hmm... tenta de novo amor 😏";
    }
}

function irParaCarta() {
    window.location.href = "carta.html";
}

/* FUNÇÃO DA DICA DA MUSICA */

function mostrarDica(){

var caixa = document.getElementById("dicaMusica");

if(caixa.style.display === "none" || caixa.style.display === ""){
    caixa.style.display = "block";
}else{
    caixa.style.display = "none";
}

}

</script>

</body>
</html>
