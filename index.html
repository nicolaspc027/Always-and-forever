<!DOCTYPE html> 
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Paola, meu amor 💚</title>

<style>
body {
    background: linear-gradient(135deg, #0f2027, #2e7d32, #a5d6a7);
    background-attachment: fixed;
    background-repeat: no-repeat;
    background-size: cover;
    
    color: white;
    text-align: center;
    font-family: Arial;
    padding-top: 100px;
}

input {
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    background-color: pink;
    border: none;
    border-radius: 8px;
    margin-left: 10px;
    cursor: pointer;
}

#proximo {
    display: none;
    margin-top: 20px;
}

/* DISCO GIRANDO */

#disco{
position: fixed;
bottom: 20px;
right: 20px;
width: 80px;
cursor: pointer;
animation: girar 6s linear infinite;
display:none;
}

@keyframes girar{
from{ transform: rotate(0deg); }
to{ transform: rotate(360deg); }
}

/* CAIXA DA DICA */

#dicaMusica{
display:none;
position:fixed;
bottom:120px;
right:20px;
background:white;
color:black;
padding:15px;
border-radius:10px;
font-size:14px;
width:220px;
box-shadow:0px 0px 10px rgba(0,0,0,0.4);
}

/* CONTADOR */

#contador{
font-size:40px;
margin-top:20px;
}
</style>
</head>

<body>

<div id="conteudo">

<h1>Para confirmar que é você</h1>

<p>Qual foi o primeiro apelido que eu te chamei?</p>

<input type="text" id="resposta" placeholder="Digite aqui...">
<button onclick="verificar()">Confirmar</button>

<p id="mensagem" style="margin-top:30px;"></p>

<button id="proximo" onclick="irParaCarta()">Ir para a próxima página 💌</button>

</div>

<!-- DISCO DE MUSICA -->

<img id="disco" src="https://cdn-icons-png.flaticon.com/512/727/727218.png" onclick="mostrarDica()">

<div id="dicaMusica">
🎵 Para essa surpresa ficar perfeita...<br><br>
Pesquise essa música:<br>
<b>Meu Abrigo - Melim</b><br>
Comece em <b>1:03</b> 💚
</div>

<script>

/* DATA DE LIBERAÇÃO */

var liberacao = new Date("2026-03-08T00:00:00");


function verificarHorario(){

var agora = new Date();

if(agora < liberacao){

document.getElementById("conteudo").innerHTML = `
<h1>Calma minha princesa 💚</h1>
<p>Sua surpresa será liberada em:</p>
<div id="contador">00:00:00</div>
`;

setInterval(atualizarContador,1000);

}else{

document.getElementById("disco").style.display = "block";

}

}


function atualizarContador(){

var agora = new Date();

var diferenca = liberacao - agora;

if(diferenca <= 0){

location.reload();
return;

}

var horas = Math.floor(diferenca / (1000*60*60));
var minutos = Math.floor((diferenca % (1000*60*60)) / (1000*60));
var segundos = Math.floor((diferenca % (1000*60)) / 1000);

horas = String(horas).padStart(2,"0");
minutos = String(minutos).padStart(2,"0");
segundos = String(segundos).padStart(2,"0");

document.getElementById("contador").innerHTML =
horas + ":" + minutos + ":" + segundos;

}


/* FUNÇÃO DA SENHA */

function verificar() {

var respostaDigitada = document.getElementById("resposta").value.trim().toLowerCase();

if (respostaDigitada === "boleta") {

document.getElementById("mensagem").innerHTML =
"Acesso liberado minha princesa 💚";

document.getElementById("proximo").style.display = "inline-block";

} else {

document.getElementById("mensagem").innerHTML =
"Hmm... tenta de novo amor 😏";

}

}

function irParaCarta() {
window.location.href = "carta.html";
}


/* FUNÇÃO DA DICA DA MUSICA */

function mostrarDica(){

var caixa = document.getElementById("dicaMusica");

if(caixa.style.display === "none" || caixa.style.display === ""){
caixa.style.display = "block";
}else{
caixa.style.display = "none";
}

}


/* INICIAR VERIFICAÇÃO DE HORÁRIO */

verificarHorario();

</script>

</body>
</html>
