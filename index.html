<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Paola, meu amor 💚</title>

<style>
body {
    background-color: black;
    color: white;
    text-align: center;
    font-family: Arial;
    padding-top: 100px;
}

input {
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    background-color: pink;
    border: none;
    border-radius: 8px;
    margin-left: 10px;
    cursor: pointer;
}

#proximo {
    display: none;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>Para confirmar que é você</h1>

<p>Qual foi o primeiro apelido que eu te chamei?</p>

<input type="text" id="resposta" placeholder="Digite aqui...">
<button onclick="verificar()">Confirmar</button>

<p id="mensagem" style="margin-top:30px;"></p>

<button id="proximo" onclick="irParaCarta()">Ir para a próxima página 💌</button>

<script>
function verificar() {

    var respostaDigitada = document.getElementById("resposta").value.trim().toLowerCase();

    if (respostaDigitada === "boleta") {

        document.getElementById("mensagem").innerHTML =
        "Acesso liberado minha princesa 💚";

        document.getElementById("proximo").style.display = "inline-block";

    } else {
        document.getElementById("mensagem").innerHTML =
        "Hmm... tenta de novo amor 😏";
    }
}

function irParaCarta() {
    window.location.href = "carta.html";
}
</script>

</body>
</html>
